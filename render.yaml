services:
  - type: web
    name: f1-race-strategy-system
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "dashboard.app:server" --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: LOG_LEVEL
        value: INFO
